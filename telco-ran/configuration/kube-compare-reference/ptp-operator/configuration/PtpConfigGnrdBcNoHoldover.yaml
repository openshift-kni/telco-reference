# Note:  This example configuration should be customized to match the desired configuration
# For this GNR-D boundary clock configuration, we support one Time Reciever port on the NAC,
# and up to 23 Time Transmitter ports including any other NAC ports and any additional
# Carter Flats ports.
apiVersion: ptp.openshift.io/v1
kind: PtpConfig
metadata:
  name: gnrd-bc
  namespace: openshift-ptp
  annotations:
    ran.openshift.io/ztp-deploy-wave: "10"
spec:
  profile:
  {{- range .spec.profile }}
  {{- if eq .name "00-bc-tt" }}
    - name: 00-bc-tt
      ptp4lConf: |
        (?<masterPorts>((\[[[:alnum:]]+\]
        masterOnly 1| *#.*| *)(\n|$))+)
        [global]
        #
        # Default Data Set
        #
        twoStepFlag 1
        slaveOnly 0
        priority1 128
        priority2 (?<priority2>[0-9]+)
        domainNumber (?<domainNumber>[0-9]+)
        #utc_offset 37
        clockClass 248
        clockAccuracy 0xFE
        offsetScaledLogVariance 0xFFFF
        free_running 0
        freq_est_interval 1
        dscp_event 0
        dscp_general 0
        dataset_comparison G.8275.x
        G.8275.defaultDS.localPriority 128
        #
        # Port Data Set
        #
        logAnnounceInterval -3
        logSyncInterval -4
        logMinDelayReqInterval -4
        logMinPdelayReqInterval -4
        announceReceiptTimeout 3
        syncReceiptTimeout 0
        delayAsymmetry 0
        fault_reset_interval -4
        neighborPropDelayThresh 20000000
        masterOnly 0
        G.8275.portDS.localPriority 128
        #
        # Run time options
        #
        assume_two_step 0
        logging_level 6
        path_trace_enabled 0
        follow_up_info 0
        hybrid_e2e 0
        inhibit_multicast_service 0
        net_sync_monitor 0
        tc_spanning_tree 0
        tx_timestamp_timeout 50
        unicast_listen 0
        unicast_master_table 0
        unicast_req_duration 3600
        use_syslog 1
        verbose 0
        summary_interval 0
        kernel_leap 1
        check_fup_sync 0
        clock_class_threshold 135
        #
        # Servo Options
        #

        # NGEN TEST MODIFIED
        # New:
        # pi_proportional_const 0.60
        # pi_integral_const 0.0003
        # Old:
        # pi_proportional_const 0.0
        # pi_integral_const 0.0
        # END TEST MOD

        pi_proportional_const 0.60
        pi_integral_const 0.001
        pi_proportional_scale 0.0
        pi_proportional_exponent -0.3
        pi_proportional_norm_max 0.7
        pi_integral_scale 0.0
        pi_integral_exponent 0.4
        pi_integral_norm_max 0.3
        step_threshold 2.0
        # end T-BC experiment
        first_step_threshold 0.00002
        max_frequency 900000000
        clock_servo pi
        sanity_freq_limit 200000000
        ntpshm_segment 0
        #
        # Transport options
        #
        transportSpecific 0x0
        ptp_dst_mac 01:1B:19:00:00:00
        p2p_dst_mac 01:80:C2:00:00:0E
        udp_ttl 1
        udp6_scope 0x0E
        uds_address /var/run/ptp4l
        #
        # Default interface options
        #
        clock_type BC
        network_transport L2
        delay_mechanism E2E
        time_stamping hardware
        tsproc_mode filter
        delay_filter moving_median
        delay_filter_length 10
        egressLatency 0
        ingressLatency 0
        boundary_clock_jbod 1
        #
        # Clock description
        #
        productDescription ;;
        revisionData ;;
        manufacturerIdentity 00:00:00
        userDescription ;
        timeSource 0xA0
      ptp4lOpts: -2 --summary_interval -4
      ptpSchedulingPolicy: SCHED_FIFO
      ptpSchedulingPriority: 10
      ptpSettings:
        controllingProfile: 01-bc-tr
        logReduce: {{ template "mustReMatchOneOf" (list .ptpSettings.logReduce "^true" "^enhanced")}}
  {{- end }}
  {{- if eq .name "01-bc-tr" }}
    - name: 01-bc-tr
      phc2sysOpts: -r -n (?<domainNumber>[0-9]+) -N 8 -R 16 -u 0 -m -s (?<upstreamInterface>[[:alnum:]]+)
      ptp4lConf: |
        [(?<upstreamInterface>[[:alnum:]]+)]
        masterOnly 0
        [global]
        #
        # Default Data Set
        #
        twoStepFlag 1
        slaveOnly 0
        priority1 128
        priority2 (?<priority2>[0-9]+)
        domainNumber (?<domainNumber>[0-9]+)
        #utc_offset 37
        clockClass 248
        clockAccuracy 0xFE
        offsetScaledLogVariance 0xFFFF
        free_running 0
        freq_est_interval 1
        dscp_event 0
        dscp_general 0
        dataset_comparison G.8275.x
        G.8275.defaultDS.localPriority 128
        #
        # Port Data Set
        #
        logAnnounceInterval -3
        logSyncInterval -4
        logMinDelayReqInterval -4
        logMinPdelayReqInterval -4
        announceReceiptTimeout 3
        syncReceiptTimeout 0
        delayAsymmetry 0
        fault_reset_interval -4
        neighborPropDelayThresh 20000000
        masterOnly 0
        G.8275.portDS.localPriority 128
        #
        # Run time options
        #
        assume_two_step 0
        logging_level 6
        path_trace_enabled 0
        follow_up_info 0
        hybrid_e2e 0
        inhibit_multicast_service 0
        net_sync_monitor 0
        tc_spanning_tree 0
        tx_timestamp_timeout 50
        unicast_listen 0
        unicast_master_table 0
        unicast_req_duration 3600
        use_syslog 1
        verbose 0
        summary_interval 0
        kernel_leap 1
        check_fup_sync 0
        clock_class_threshold 135
        #
        # Servo Options
        #

        # NGEN TEST MODIFIED
        # New:
        # pi_proportional_const 0.60
        # pi_integral_const 0.0003
        # Old:
        # pi_proportional_const 0.0
        # pi_integral_const 0.0
        # END TEST MOD

        pi_proportional_const 0.60
        pi_integral_const 0.001
        pi_proportional_scale 0.0
        pi_proportional_exponent -0.3
        pi_proportional_norm_max 0.7
        pi_integral_scale 0.0
        pi_integral_exponent 0.4
        pi_integral_norm_max 0.3
        step_threshold 2.0
        # end T-BC experiment
        first_step_threshold 0.00002
        max_frequency 900000000
        clock_servo pi
        sanity_freq_limit 200000000
        ntpshm_segment 0
        #
        # Transport options
        #
        transportSpecific 0x0
        ptp_dst_mac 01:1B:19:00:00:00
        p2p_dst_mac 01:80:C2:00:00:0E
        udp_ttl 1
        udp6_scope 0x0E
        uds_address /var/run/ptp4l
        #
        # Default interface options
        #
        clock_type OC
        network_transport L2
        delay_mechanism E2E
        time_stamping hardware
        tsproc_mode filter
        delay_filter moving_median
        delay_filter_length 10
        egressLatency 0
        ingressLatency 0
        boundary_clock_jbod 1
        #
        # Clock description
        #
        productDescription ;;
        revisionData ;;
        manufacturerIdentity 00:00:00
        userDescription ;
        timeSource 0xA0
      ptp4lOpts: -2 --summary_interval -4
      ptpSchedulingPolicy: SCHED_FIFO
      ptpSchedulingPriority: 10
      ptpSettings:
        clockType: T-BC
        inSyncConditionThreshold: "10"
        inSyncConditionTimes: "12"
        logReduce: {{ template "mustReMatchOneOf" (list .ptpSettings.logReduce "^true" "^enhanced")}}
        leadingInterface: (?<leadingInterface>[[:alnum:]]+)
        upstreamPort: (?<upstreamInterface>[[:alnum:]]+)
      plugins:
        e825:
          devices:
            {{- .plugins.e825.devices | toYaml | nindent 12 }}
          settings:
            LocalMaxHoldoverOffSet: 500
            LocalHoldoverTimeout: 0
            MaxInSpecOffset: 100
        {{- if .plugins.e830 }}
        e830:
          devices:
            {{- .plugins.e830.devices | toYaml | nindent 12 }}
        {{- end }}
      ts2phcConf: |
        [global]
        use_syslog  0
        verbose 1
        logging_level 7
        ts2phc.pulsewidth 500000000
        leapfile  /usr/share/zoneinfo/leap-seconds.list
        domainNumber (?<domainNumber>[0-9]+)
        uds_address /var/run/ptp4l.1.socket
        [(?<leadingInterface>[[:alnum:]]+)]
        ts2phc.extts_correction 0
        ts2phc.master 0
        ts2phc.channel 0
        ts2phc.pin_index 1
        (?<ts2phcPortConfig>((\[[[:alnum:]]+\]
        ts2phc.extts_polarity rising
        ts2phc.extts_correction 0
        ts2phc.master 0
        ts2phc.channel 0
        ts2phc.pin_index 1| *#.*| *)(\n|$))*)
      ts2phcOpts: -s generic -a --ts2phc.rh_external_pps 1
  {{- end }}
  {{- end }}
  recommend:
    {{- .spec.recommend | toYaml | nindent 4 }}
