storage_lso_StorageClass:
  - metadata:
      name: example-storage-class
    provisioner: kubernetes.io/no-provisioner
storage_StorageLV:
  - metadata:
      name: local-disks
    spec:
      storageClassDevices:
        - devicePaths:
            - /dev/disk/by-path/pci-0000:05:00.0-nvme-1
          fsType: xfs
          storageClassName: "example-storage-class"
          volumeMode: Filesystem
storage_lso_StorageSubscription:
  - spec:
      source: redhat-operators-disconnected
ptp_operator_configuration_PtpConfigGnrdTGM:
  - spec:
      profile:
      - ptpSettings:
          logReduce: "true"
        plugins:
          e825:
            devices:
              - eno8703
          e830:
            devices:
              - enp108s0f0
              - enp110s0f0
      recommend:
      - profile: grandmaster
        priority: 4
        match:
          - nodeLabel: "node-role.kubernetes.io/$mcp"
    captureGroup_defaults:
      leadingInterface: eno8703
      priority2: 128
      domainNumber: 24
      ts2phcPortConfig: |-
        # This should be one section per Carter Flats (e830) card:
                [enp108s0f0]
                ts2phc.extts_polarity rising
                ts2phc.extts_correction 0
                ts2phc.master 0
                ts2phc.channel 0
                ts2phc.pin_index 1
                [enp110s0f0]
                ts2phc.extts_polarity rising
                ts2phc.extts_correction 0
                ts2phc.master 0
                ts2phc.channel 0
                ts2phc.pin_index 1
      masterPorts: |-
        # All TimeTransmitter ports should be outlined here with 'masterOnly 1'
                #[eno8303]
                # ** Host management interface
                [eno8403]
                masterOnly 1
                [eno8503]
                masterOnly 1
                [eno8603]
                masterOnly 1
                [eno8703]
                masterOnly 1
                [eno8803]
                masterOnly 1
                [eno8903]
                masterOnly 1
                [eno9003]
                masterOnly 1
                [enp108s0f0]
                masterOnly 1
                [enp108s0f1]
                masterOnly 1
                [enp108s0f2]
                masterOnly 1
                [enp108s0f3]
                masterOnly 1
                [enp108s0f4]
                masterOnly 1
                [enp108s0f5]
                masterOnly 1
                [enp108s0f6]
                masterOnly 1
                [enp108s0f7]
                masterOnly 1
                [enp110s0f0]
                masterOnly 1
                [enp110s0f1]
                masterOnly 1
                [enp110s0f2]
                masterOnly 1
                [enp110s0f3]
                masterOnly 1
                [enp110s0f4]
                masterOnly 1
                [enp110s0f5]
                masterOnly 1
                [enp110s0f6]
                masterOnly 1
                [enp110s0f7]
                masterOnly 1
