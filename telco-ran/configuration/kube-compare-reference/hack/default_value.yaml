    captureGroup_defaults:
      priority2: 128
      domainNumber: 24
      masterPorts: |-
        # Include one section for each TimeTransmitter port on the WPC cards:
              [ens1f0]
              masterOnly 1
              [ens1f1]
              masterOnly 1
              [ens2f0]
              masterOnly 1
              [ens2f1]
              masterOnly 1
              # ...
