# Custom configuration for yamllint used to verify content in this
# repository.

extends: default

ignore: |
  # Go-templated kube-compare reference directories — not valid YAML
  telco-core/configuration/reference-crs-kube-compare/
  telco-hub/configuration/reference-crs-kube-compare/
  telco-ran/configuration/kube-compare-reference/
  # Generated MachineConfig CRs with base64 ignition data exceeding line limits
  telco-ran/install/extra-manifests/
  # Generated PolicyGenTemplate output with mixed indentation from the toolchain
  telco-ran/configuration/argocd/example/policygentemplates/group-du-clo5-cleanup-policy.yaml

rules:
  # Allow for whitespace in [] lists for readability, eg [ value, value ]
  brackets:
    max-spaces-inside: 1

  # Allow for one line of whitespace in yaml files to improve readability
  empty-lines:
    max: 1

  # Allow for some variation on indentation. Enforce consistency
  # throughout the file.
  indentation:
    spaces: consistent
    # In some cases it is helpful to indent a top level list with long
    # entries but allow aligned lists inside
    indent-sequences: whatever

  # Unfortunately we have base64 encoded content and templated lines
  # which are quite long.
  line-length:
    max: 2000
