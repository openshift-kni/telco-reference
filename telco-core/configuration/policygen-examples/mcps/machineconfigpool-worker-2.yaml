apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfigPool
metadata:
  labels:
    machineconfiguration.openshift.io/role: workload-2-worker-mcp
  name: workload-2-worker-mcp
spec:
  machineConfigSelector:
    matchExpressions:
    - key: machineconfiguration.openshift.io/role
      operator: In
      values:
      - workload-2-worker-mcp
      - worker
  # installation paused
  # installation will be done at the end of ZTP
  paused: true
  # example 50% worker nodes unavailable during deployment
  maxUnavailable: 50%
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/workload-2-worker-mcp: ""
